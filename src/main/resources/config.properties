# VelocityDiscordAuth configuration
# Database (same MariaDB used by DiscordSRV on the backend)
db.host=127.0.0.1
db.port=3306
db.name=discord
db.user=root
db.password=

# Must match Experiment_JdbcTablePrefix in DiscordSRV's config.yml (default: discordsrv)
discordsrv.table_prefix=discordsrv

# Kick message shown to unlinked players. {code} is replaced with the link code.
messages.kick=\u00a7cYour account is not linked to Discord.\n\u00a77Send the code \u00a7e{code} \u00a77to the Discord bot to link your account.
messages.already_pending=\u00a7cYour account is not linked yet.\n\u00a77Your link code is \u00a7e{code}\u00a77.\n\u00a77Send it to the Discord bot.
